<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">{% endif %}
  
  <!-- Additional SEO Meta Tags -->
  <meta name="robots" content="index, follow">
  <meta name="author" content="Alamo Tech Collective">
  <meta property="og:site_name" content="Alamo Tech Collective">
  <meta property="og:locale" content="en_US">
  <meta name="geo.region" content="US-TX">
  <meta name="geo.placename" content="San Antonio">
  <meta name="geo.position" content="29.532;-98.495">
  <link rel="icon" type="image/x-icon" href="{{ '/assets/images/logo_no-text.ico' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <script
    src="https://kit.fontawesome.com/7b1a670042.js"
    crossorigin="anonymous"
  ></script>
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  
  {% feed_meta %}
  {% seo %}
  
  <script type="application/ld+json">
    {% include structured-data.json %}
  </script>
  
</head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXG6JR0SHF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-XXG6JR0SHF');
  </script>
  <body class="layout-{{ page.layout | default: 'default' }}">
    {% include header.html %}
    
    <main id="main-content" role="main" tabindex="-1">
      {{ content }}
    </main>
    
    {% include footer.html %}
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
